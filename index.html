<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Urge of Blood</title>
    <style>
        body { background-color: #0a0a0a; color: #c0c0c0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .prescript-box { border: 1px solid #333; padding: 30px; background: #111; width: 450px; text-align: center; box-shadow: 0 0 15px #000; position: relative; }
        h1 { font-size: 1rem; letter-spacing: 5px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        #output { font-size: 1.1rem; margin: 25px 0; min-height: 60px; line-height: 1.5; color: #e0e0e0; }
        
        button { background: #111; color: #666; border: 1px solid #444; padding: 10px 25px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover:not(:disabled) { color: #fff; border-color: #fff; background: #1a1a1a; }
        
        /* Style for locked button */
        button:disabled { color: #333; border-color: #222; cursor: not-allowed; }

        .history { margin-top: 20px; width: 450px; font-size: 0.8rem; color: #555; text-align: left; }
        .history-item { border-left: 2px solid #222; padding-left: 10px; margin-bottom: 8px; }
        strong { color: #aaa; }
    </style>
</head>
<body onload="checkDailyStatus()">

<div class="prescript-box">
    <h1>【 Blood Will 】</h1>
    <div id="output">The call of power awaits..</div>
    <button id="callBtn" onclick="receiveWill()">Listen to the call</button>
</div>

<div class="history" id="history-log"></div>

<script>
// Data remains consistent
const actionMap = {
    "grind": ["Treasure charts", "Sea Charts", "Towers", "reputation"],
    "kill": ["Minibosses", "Story Bosses", "Sea monsters", "Rivals"],
    "sail in": ["the Bronze Sea", "the Nimbus Sea", "the Dark Sea"]
};
const conditions = ["for exactly 1 hour", "for an in-game week", "10 times", "without dying"];

function checkDailyStatus() {
    const lastDate = localStorage.getItem('bloodWillDate');
    const today = new Date().toLocaleDateString();

    // If the date in storage matches today, lock the interface
    if (lastDate === today) {
        const savedWill = localStorage.getItem('currentBloodWill');
        document.getElementById('output').innerHTML = savedWill;
        lockButton();
    }
}

function lockButton() {
    const btn = document.getElementById('callBtn');
    btn.disabled = true;
    btn.innerText = "The call is silent";
}

function receiveWill() {
    const today = new Date().toLocaleDateString();

    // Randomization Logic
    const actKeys = Object.keys(actionMap);
    const act = actKeys[Math.floor(Math.random() * actKeys.length)];
    const tar = actionMap[act][Math.floor(Math.random() * actionMap[act].length)];
    const cond = conditions[Math.floor(Math.random() * conditions.length)];

    const finalDirective = `You shall <strong>${act}</strong> ${tar} ${cond}.`;
    
    // Save to LocalStorage so it persists all day
    localStorage.setItem('bloodWillDate', today);
    localStorage.setItem('currentBloodWill', finalDirective);

    // Update main display and lock button
    document.getElementById('output').innerHTML = finalDirective;
    lockButton();
}
</script>

</body>
</html>
