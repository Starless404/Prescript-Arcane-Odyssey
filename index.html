<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Urge of Blood</title>
    <style>
        :root { --blood-red: #c0c0c0; }
        body { 
            background-color: #000; color: var(--blood-red); 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            transition: background-color 2s ease; overflow: hidden;
        }
        .prescript-box { 
            border: 1px solid var(--blood-red); padding: 30px; background: #111; 
            width: 450px; text-align: center; box-shadow: 0 0 15px rgba(255,255,255,0.05); 
        }
        h1 { font-size: 1rem; letter-spacing: 5px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #output { font-size: 1.1rem; margin: 25px 0; min-height: 80px; color: #e0e0e0; }
        button { 
            background: #111; color: var(--blood-red); border: 1px solid var(--blood-red); 
            padding: 10px 25px; cursor: pointer; text-transform: uppercase; width: 80%;
        }
        button:disabled { opacity: 0.1; cursor: not-allowed; }
        .history-container {
            width: 450px; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 25px; padding: 15px; font-size: 0.85rem;
        }
        .debug-corner { position: fixed; bottom: 15px; right: 15px; }
        .debug-btn { font-size: 0.6rem; color: #333; border: 1px solid #222; width: auto; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div class="prescript-box">
    <h1>【 Blood Will 】</h1>
    <div id="output">Initialising...</div>
    <div id="btnArea">
        <button id="mainBtn" onclick="handleCall()">Listen</button>
    </div>
    <div id="lockTimer" style="font-size: 0.7rem; color: #444; margin-top: 10px;"></div>
</div>

<div class="history-container" id="historyBox"></div>

<div class="debug-corner">
    <button class="debug-btn" onclick="manualReset()">[ PURGE DATA ]</button>
</div>

<script>
    function getUTC() {
        const now = new Date();
        const day = now.getUTCDay(); 
        return { 
            step: day === 0 ? 7 : day, 
            dateStr: now.getUTCFullYear() + "-" + (now.getUTCMonth()+1) + "-" + now.getUTCDate() 
        };
    }

    function init() {
        try {
            const utc = getUTC();
            const lastDate = localStorage.getItem('bloodUTCStepDate');
            
            // Monday Reset
            if (utc.step === 1 && lastDate !== utc.dateStr) {
                localStorage.removeItem('endlessBloodLog');
            }

            const data = JSON.parse(localStorage.getItem('endlessBloodLog')) || { logs: [] };
            const doneToday = data.logs.some(l => l.date === utc.dateStr);

            // Set Atmosphere
            const count = Math.min(data.logs.length, 7);
            document.body.style.backgroundColor = `rgb(${count * 30}, 0, 0)`;

            // Render Logic
            const output = document.getElementById('output');
            const btn = document.getElementById('mainBtn');

            if (doneToday) {
                output.innerText = "The Call is Silent for today.";
                btn.disabled = true;
                btn.innerText = "Locked";
            } else {
                output.innerText = "The silence breaks. Will you listen?";
                btn.disabled = false;
                btn.innerText = "Listen to the call";
            }
            renderLog(data);
        } catch (e) {
            console.error("Recovery mode triggered");
            localStorage.clear();
            location.reload();
        }
    }

    function handleCall() {
        const utc = getUTC();
        const task = "Execute the designated target."; // Simplified for test
        document.getElementById('output').innerHTML = `You must <strong>${task}</strong>.`;
        document.getElementById('btnArea').innerHTML = `<button onclick="completeTask('${task}')">Mark Executed</button>`;
    }

    function completeTask(taskText) {
        const utc = getUTC();
        let data = JSON.parse(localStorage.getItem('endlessBloodLog')) || { logs: [] };
        if (data.logs.length < 7) {
            data.logs.push({ step: utc.step, task: taskText, date: utc.dateStr });
            localStorage.setItem('endlessBloodLog', JSON.stringify(data));
            localStorage.setItem('bloodUTCStepDate', utc.dateStr);
        }
        location.reload();
    }

    function renderLog(data) {
        const box = document.getElementById('historyBox');
        box.innerHTML = data.logs.length ? data.logs.map(l => `<div>Step ${l.step}: ${l.task}</div>`).join('') : "No offerings.";
    }

    function manualReset() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
